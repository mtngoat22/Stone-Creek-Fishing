const ipt={width:"100%",background:$.inp,border:`1px solid ${$.bd}`,color:$.tx,padding:"9px 12px",borderRadius:8,fontFamily:F,fontSize:13,outline:"none",boxSizing:"border-box"};

function App(){
  const[user,setUser]=useState(null);
  const[view,setView]=useState("spots");
  const[spots,setSpots]=useState([]);
  const[catches,setCatches]=useState([]);
  const[loading,setLoading]=useState(true);
  const[sel,setSel]=useState(null);
  const[modal,setModal]=useState(null);
  const[filter,setFilter]=useState("All Regions");
  const[sort,setSort]=useState("rating");
  const[isPro,setIsPro]=useState(false);
  const[auth,setAuth]=useState({username:"",email:"",password:""});
  const[signUp,setSignUp]=useState(false);
  const[err,setErr]=useState("");

  // ===== LOAD DATA FROM SUPABASE =====
  useEffect(()=>{(async()=>{
    try {
      // Check if already logged in
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile) setUser({ ...profile, email: session.user.email });
      }

      // Load spots
      const { data: spotData } = await supabase.from('spots').select('*').order('avg_rating', { ascending: false });
      if (spotData?.length) {
        setSpots(spotData.map(s => ({
          id: s.id, name: s.name, reg: s.region, species: s.species || [],
          rating: parseFloat(s.avg_rating) || 0, ratings: [], catches: s.total_catches || 0,
          by: s.is_official ? 'UDWR' : 'Community', desc: s.description || '',
        })));
      }

      // Load catches
      const { data: catchData } = await supabase.from('catches').select('*, profiles(username)').order('caught_at', { ascending: false }).limit(200);
      if (catchData?.length) {
        setCatches(catchData.map(c => ({
          id: c.id, user: c.profiles?.username || 'Angler', sid: c.spot_id,
          species: c.species, qty: c.quantity, date: c.caught_at,
          notes: c.notes || '', meth: c.method || '',
        })));
      }
    } catch(e) { console.error('Load error:', e); }
    setLoading(false);
  })();},[]);

  // ===== SIGN UP / SIGN IN =====
  const login = async () => {
    setErr("");
    if (signUp) {
      // SIGN UP — need username + email + password
      if (!auth.username.trim()) return setErr("Pick a username!");
      if (!auth.email.trim()) return setErr("Enter your email!");
      if (auth.password.length < 6) return setErr("Password must be 6+ characters");
      const { data, error } = await supabase.auth.signUp({
        email: auth.email, password: auth.password,
        options: { data: { username: auth.username.trim() } }
      });
      if (error) return setErr(error.message);
      if (data.user) {
        // Wait a moment for the profile trigger to fire
        await new Promise(r => setTimeout(r, 500));
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
        setUser(profile ? { ...profile, email: data.user.email } : { username: auth.username.trim(), id: data.user.id, email: data.user.email });
      }
    } else {
      // SIGN IN — need email + password
      if (!auth.email.trim()) return setErr("Enter your email!");
      if (!auth.password) return setErr("Enter your password!");
      const { data, error } = await supabase.auth.signInWithPassword({ email: auth.email, password: auth.password });
      if (error) return setErr(error.message);
      if (data.user) {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
        setUser(profile ? { ...profile, email: data.user.email } : { username: data.user.email.split('@')[0], id: data.user.id, email: data.user.email });
      }
    }
  };

  // ===== SIGN OUT =====
  const logout = async () => { await supabase.auth.signOut(); setUser(null); };

  const goPro=async()=>{setIsPro(true);};

  // Helper to reload spots
  const reloadSpots = async () => {
    const { data } = await supabase.from('spots').select('*').order('avg_rating', { ascending: false });
    if (data) setSpots(data.map(s => ({ id: s.id, name: s.name, reg: s.region, species: s.species || [], rating: parseFloat(s.avg_rating) || 0, ratings: [], catches: s.total_catches || 0, by: s.is_official ? 'UDWR' : 'Community', desc: s.description || '' })));
  };

  // Helper to reload catches
  const reloadCatches = async () => {
    const { data } = await supabase.from('catches').select('*, profiles(username)').order('caught_at', { ascending: false }).limit(200);
    if (data) setCatches(data.map(c => ({ id: c.id, user: c.profiles?.username || 'Angler', sid: c.spot_id, species: c.species, qty: c.quantity, date: c.caught_at, notes: c.notes || '', meth: c.method || '' })));
  };

  if(loading)return <div style={{background:$.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F}}><div style={{color:$.a,fontSize:15}}>Loading Stone Creek...</div></div>;

  // AUTH SCREEN
  if(!user)return(
    <div style={{background:$.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-120,right:-80,width:400,height:400,borderRadius:"50%",background:`radial-gradient(circle,${$.aD}12,transparent 70%)`}}/>
      <div style={{position:"absolute",bottom:-100,left:-60,width:350,height:350,borderRadius:"50%",background:`radial-gradient(circle,${$.gD}15,transparent 70%)`}}/>
      <div style={{width:"100%",maxWidth:400,padding:20,zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:20,letterSpacing:4,color:$.stone,marginBottom:8}}>🪨</div>
          <h1 style={{fontFamily:FD,fontSize:36,fontWeight:800,margin:0,color:$.tx,letterSpacing:-0.5}}>Stone Creek</h1>
          <p style={{fontFamily:FD,color:$.w,fontSize:14,marginTop:2,fontWeight:500,fontStyle:"italic"}}>Fishing</p>
          <p style={{color:$.dm,fontSize:11,marginTop:10,letterSpacing:2,textTransform:"uppercase"}}>Know the water before you go</p>
        </div>
        <div style={{background:$.cd,borderRadius:14,padding:28,border:`1px solid ${$.bd}`}}>
          <h2 style={{fontFamily:FD,fontSize:18,margin:"0 0 20px",color:$.tx}}>{signUp?"Join the Creek":"Welcome Back"}</h2>
          {signUp && <div style={{marginBottom:14}}>
            <label style={{...lbl,marginTop:0}}>USERNAME</label>
            <input value={auth.username} onChange={e=>setAuth({...auth,username:e.target.value})} placeholder="angler_name" style={ipt}/>
          </div>}
          <div style={{marginBottom:14}}>
            <label style={{...lbl,marginTop:0}}>EMAIL</label>
            <input value={auth.email} onChange={e=>setAuth({...auth,email:e.target.value})} placeholder="you@email.com" type="email" style={ipt}/>
          </div>
          <div style={{marginBottom:14}}>
            <label style={{...lbl,marginTop:0}}>PASSWORD</label>
            <input value={auth.password} onChange={e=>setAuth({...auth,password:e.target.value})} placeholder="••••••••" type="password" onKeyDown={e=>e.key==="Enter"&&login()} style={ipt}/>
          </div>
          {err && <div style={{color:$.r,fontSize:11,marginBottom:10,padding:"6px 10px",background:$.r+"12",borderRadius:6}}>{err}</div>}
          <button onClick={login} style={{width:"100%",background:`linear-gradient(135deg,${$.a},${$.aD})`,border:"none",color:"#fff",padding:"13px",borderRadius:10,cursor:"pointer",fontFamily:F,fontSize:15,fontWeight:600,marginTop:4}}>{signUp?"Create Account":"Sign In"}</button>
          <div style={{textAlign:"center",marginTop:16,fontSize:13,color:$.dm}}>{signUp?"Have an account?":"New here?"}{" "}<span onClick={()=>{setSignUp(!signUp);setErr("");}} style={{color:$.a,cursor:"pointer",fontWeight:500}}>{signUp?"Sign In":"Join Free"}</span></div>
        </div>
        <p style={{textAlign:"center",marginTop:20,fontSize:10,color:$.mt}}>Free forever · Community-powered fishing intel</p>
      </div>
    </div>
  );

  const fSpots=spots.filter(s=>filter==="All Regions"||s.reg===filter).sort((a,b)=>sort==="rating"?b.rating-a.rating:sort==="catches"?b.catches-a.catches:a.name.localeCompare(b.name));

  return(
    <div style={{background:$.bg,minHeight:"100vh",fontFamily:F,color:$.tx}}>
      {/* HEADER */}
      <header style={{background:$.bg2,borderBottom:`1px solid ${$.bd}`,padding:"0 20px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>{setView("spots");setSel(null);}}>
            <span style={{fontSize:16,color:$.stone}}>🪨</span>
            <div style={{lineHeight:1}}>
              <span style={{fontFamily:FD,fontSize:17,fontWeight:700,color:$.tx}}>Stone Creek</span>
              <span style={{fontFamily:FD,fontSize:11,color:$.w,marginLeft:6,fontStyle:"italic",fontWeight:500}}>Fishing</span>
            </div>
          </div>
          <nav style={{display:"flex",gap:2}}>
            {[{k:"spots",l:"Spots",i:"📍"},{k:"log",l:"My Catches",i:"📋"},{k:"board",l:"Board",i:"🏆"},{k:"deals",l:"Gear",i:"🛒"},{k:"feed",l:"Feed",i:"📊"}].map(n=>(
              <button key={n.k} onClick={()=>{setView(n.k);setSel(null);}} style={{
                background:view===n.k?$.aD+"30":"transparent",border:view===n.k?`1px solid ${$.aD}44`:"1px solid transparent",
                color:view===n.k?$.aL:$.dm,padding:"6px 11px",borderRadius:8,cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:4
              }}><span style={{fontSize:12}}>{n.i}</span>{n.l}</button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setModal("hatch")} style={{background:`linear-gradient(135deg,${$.g},${$.gD})`,border:"none",color:"#fff",padding:"4px 10px",borderRadius:7,cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:600}}>🪰 Report Hatch</button>
            {isPro&&<span style={{background:$.proD+"35",color:$.pro,padding:"3px 8px",borderRadius:8,fontSize:9,fontWeight:600,border:`1px solid ${$.proD}50`,letterSpacing:1}}>PRO</span>}
            {!isPro&&<button onClick={()=>setModal("pro")} style={{background:`linear-gradient(135deg,${$.pro},${$.proD})`,border:"none",color:"#fff",padding:"4px 10px",borderRadius:7,cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:600}}>Go Pro</button>}
            <span onClick={logout} title="Click to sign out" style={{background:$.sf,padding:"4px 10px",borderRadius:12,fontSize:11,color:$.dm,cursor:"pointer"}}>👤 {user.username}</span>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1100,margin:"0 auto",padding:"20px 20px 80px"}}>
        {view==="spots"&&!sel&&<SpotsList spots={fSpots} filter={filter} setFilter={setFilter} sort={sort} setSort={setSort} onSel={setSel} onAdd={()=>setModal("add")} catches={catches}/>}
        {view==="spots"&&sel&&<Detail spot={sel} onBack={()=>setSel(null)} catches={catches} user={user} spots={spots} onLog={()=>setModal("catch")} isPro={isPro} onPro={()=>setModal("pro")}/>}

    </div>
    <label style={lbl}>NOTES</label>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="What were the fish doing? Rise forms?" rows={3} style={{...ipt,resize:"vertical"}}/>
    <button onClick={submit} disabled={saving} style={{width:"100%",background:`linear-gradient(135deg,${$.g},${$.gD})`,border:"none",color:"#fff",padding:"13px",borderRadius:10,cursor:"pointer",fontFamily:F,fontSize:15,fontWeight:600,marginTop:14,opacity:saving?0.6:1}}>{saving?"Submitting...":"Submit Hatch Report"}</button>
  </Overlay>;
}

function Card({children,style={}}){return <div style={{background:$.cd,borderRadius:12,padding:16,border:`1px solid ${$.bd}`,position:"relative",...style}}>{children}</div>;}
const h3={fontFamily:FD,fontSize:15,fontWeight:600,margin:"0 0 10px"};
const ddSt={background:$.sf,border:`1px solid ${$.bd}`,color:$.tx,padding:"7px 12px",borderRadius:8,fontFamily:F,fontSize:12};
const proBtn={background:$.pro,border:"none",color:"#fff",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:600};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
