function App(){
  const[user,setUser]=useState(null);
  const[view,setView]=useState("spots");
  const[spots,setSpots]=useState([]);
  const[catches,setCatches]=useState([]);
  const[loading,setLoading]=useState(true);
  const[sel,setSel]=useState(null);
  const[modal,setModal]=useState(null);
  const[filter,setFilter]=useState("All Regions");
  const[sort,setSort]=useState("rating");
  const[isPro,setIsPro]=useState(false);
  const[auth,setAuth]=useState({username:"",email:"",password:""});
  const[signUp,setSignUp]=useState(false);
  const[err,setErr]=useState("");

  // ===== LOAD DATA FROM SUPABASE =====
  useEffect(()=>{(async()=>{
    try {
      // Check if already logged in
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', session.user.id).single();
        if (profile) setUser({ ...profile, email: session.user.email });
      }

      // Load spots
      const { data: spotData } = await supabase.from('spots').select('*').order('avg_rating', { ascending: false });
      if (spotData?.length) {
        setSpots(spotData.map(s => ({
          id: s.id, name: s.name, reg: s.region, region: s.region, species: s.species || [],
          rating: parseFloat(s.avg_rating) || 0, ratings: [], catches: s.total_catches || 0,
          by: s.is_official ? 'UDWR' : 'Community', desc: s.description || '', description: s.description || '',
          latitude: s.latitude, longitude: s.longitude,
        })));
      }

      // Load catches
      const { data: catchData } = await supabase.from('catches').select('*, profiles(username)').order('caught_at', { ascending: false }).limit(200);
      if (catchData?.length) {
        setCatches(catchData.map(c => {
          let photos=[];
          if(c.photo_url){try{photos=JSON.parse(c.photo_url);}catch{photos=[c.photo_url];}}
          return {
            id: c.id, user: c.profiles?.username || 'Angler', sid: c.spot_id,
            species: c.species, qty: c.quantity, date: c.caught_at,
            notes: c.notes || '', meth: c.method || '',
            length: c.length_inches || null, lakeSpot: c.lake_spot || '',
            photos, tripId: c.trip_id || null,
          };
        }));
      }
    } catch(e) { console.error('Load error:', e); }
    setLoading(false);
  })();},[]);

  // ===== SIGN UP / SIGN IN =====
  const login = async () => {
    setErr("");
    if (signUp) {
      // SIGN UP — need username + email + password
      if (!auth.username.trim()) return setErr("Pick a username!");
      if (!auth.email.trim()) return setErr("Enter your email!");
      if (auth.password.length < 6) return setErr("Password must be 6+ characters");
      const { data, error } = await supabase.auth.signUp({
        email: auth.email, password: auth.password,
        options: { data: { username: auth.username.trim() } }
      });
      if (error) return setErr(error.message);
      if (data.user) {
        // Wait a moment for the profile trigger to fire
        await new Promise(r => setTimeout(r, 500));
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
        setUser(profile ? { ...profile, email: data.user.email } : { username: auth.username.trim(), id: data.user.id, email: data.user.email });
      }
    } else {
      // SIGN IN — need email + password
      if (!auth.email.trim()) return setErr("Enter your email!");
      if (!auth.password) return setErr("Enter your password!");
      const { data, error } = await supabase.auth.signInWithPassword({ email: auth.email, password: auth.password });
      if (error) return setErr(error.message);
      if (data.user) {
        const { data: profile } = await supabase.from('profiles').select('*').eq('id', data.user.id).single();
        setUser(profile ? { ...profile, email: data.user.email } : { username: data.user.email.split('@')[0], id: data.user.id, email: data.user.email });
      }
    }
  };

  // ===== SIGN OUT =====
  const logout = async () => { await supabase.auth.signOut(); setUser(null); };

  const goPro=async()=>{setIsPro(true);};

  // Helper to reload spots
  const reloadSpots = async () => {
    const { data } = await supabase.from('spots').select('*').order('avg_rating', { ascending: false });
    if (data) setSpots(data.map(s => ({ id: s.id, name: s.name, reg: s.region, region: s.region, species: s.species || [], rating: parseFloat(s.avg_rating) || 0, ratings: [], catches: s.total_catches || 0, by: s.is_official ? 'UDWR' : 'Community', desc: s.description || '', description: s.description || '', latitude: s.latitude, longitude: s.longitude })));
  };

  // Helper to reload catches
  const reloadCatches = async () => {
    const { data } = await supabase.from('catches').select('*, profiles(username)').order('caught_at', { ascending: false }).limit(200);
    if (data) setCatches(data.map(c => {
      let photos=[];if(c.photo_url){try{photos=JSON.parse(c.photo_url);}catch{photos=[c.photo_url];}}
      return { id: c.id, user: c.profiles?.username || 'Angler', sid: c.spot_id, species: c.species, qty: c.quantity, date: c.caught_at, notes: c.notes || '', meth: c.method || '', length: c.length_inches || null, lakeSpot: c.lake_spot || '', photos, tripId: c.trip_id || null };

function MapView({spots,onSel}){
  const mapRef = useRef(null);
  const [bitingBySpot, setBitingBySpot] = useState({});
  const [mapReady, setMapReady] = useState(false);

  useEffect(()=>{(async()=>{
    // Load today's biting reports for all spots
    const today = new Date().toISOString().split('T')[0];
    const { data } = await supabase.from('biting_reports')
      .select('spot_id, species, biting_on, method, bite_rating, notes')
      .eq('reported_at', today);
    const map = {};
    (data||[]).forEach(r => {
      if (!map[r.spot_id]) map[r.spot_id] = [];
      map[r.spot_id].push(r);
    });
    setBitingBySpot(map);
  })();},[]);

  useEffect(()=>{
    if (mapRef.current) return;
    const init = () => {
      if (!window.L) { setTimeout(init, 100); return; }
      const el = document.getElementById('fishmap');
      if (!el) { setTimeout(init, 100); return; }
      const map = L.map('fishmap').setView([39.5, -111.5], 7);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        maxZoom: 18,
      }).addTo(map);
      mapRef.current = map;
      setMapReady(true);
      setTimeout(()=>map.invalidateSize(), 200);
    };
    init();
    return () => {
      if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }
    };
  },[]);

  useEffect(()=>{
    if (!mapReady || !mapRef.current || !spots.length) return;
    const map = mapRef.current;
    // Clear old markers
    map.eachLayer(l => { if (l instanceof L.Marker) map.removeLayer(l); });

    const bitingColors = { on_fire:'#ef4444', hot:'#f97316', good:'#22c55e', fair:'#eab308', slow:'#6b7280' };
    let added = 0;
    console.log('First spot data:', spots[0]);

    spots.forEach(spot => {
      const lat = parseFloat(spot.latitude);
      const lng = parseFloat(spot.longitude);
      if (isNaN(lat) || isNaN(lng)) return;
      const reports = bitingBySpot[spot.id] || [];
      const topReport = reports[0];
      const color = topReport ? (bitingColors[topReport.bite_rating] || '#3b82f6') : '#3b82f6';

      const icon = L.divIcon({
        className: 'fish-pin',
        html: `<div style="background:${color};width:22px;height:22px;border-radius:50%;border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;font-size:11px;">🐟</div>`,
        iconSize: [28,28],
        iconAnchor: [14,14],
      });

      const marker = L.marker([lat, lng], {icon}).addTo(map);
      added++;

      // Popup content
      let popup = `<div style="font-family:system-ui,sans-serif;min-width:200px;max-width:260px;">`;
      popup += `<div style="font-weight:700;font-size:14px;color:#0f172a;margin-bottom:4px;">${spot.name}</div>`;
      popup += `<div style="font-size:10px;color:#64748b;margin-bottom:8px;">${spot.region||''}</div>`;
      if (reports.length) {
        popup += `<div style="border-top:1px solid #e2e8f0;padding-top:6px;">`;
        popup += `<div style="font-size:11px;font-weight:600;color:#0f172a;margin-bottom:4px;">🔥 What's Biting Today</div>`;
        reports.slice(0,3).forEach(r => {
          const c = bitingColors[r.bite_rating] || '#6b7280';
          popup += `<div style="margin-bottom:6px;padding:4px;background:#f8fafc;border-radius:4px;border-left:3px solid ${c};">`;
          popup += `<div style="font-size:11px;font-weight:600;color:#0f172a;">${r.species} <span style="color:${c};font-size:9px;text-transform:uppercase;">${r.bite_rating}</span></div>`;
          popup += `<div style="font-size:10px;color:#475569;">On: ${r.biting_on}</div>`;
          popup += `<div style="font-size:9px;color:#94a3b8;">Method: ${r.method}</div>`;
          popup += `</div>`;
        });
        popup += `</div>`;
      } else {
        popup += `<div style="font-size:10px;color:#94a3b8;font-style:italic;">No reports today</div>`;
      }
      popup += `<button id="sel-${spot.id}" style="width:100%;margin-top:8px;background:#3b82f6;color:#fff;border:none;padding:6px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;">View Spot →</button>`;
      popup += `</div>`;

      marker.bindPopup(popup);
      marker.on('popupopen', () => {
        setTimeout(() => {
          const btn = document.getElementById(`sel-${spot.id}`);
          if (btn) btn.onclick = () => onSel(spot);
        }, 100);
      });
    });
    console.log(`Map: added ${added} pins from ${spots.length} spots`);
  },[spots, bitingBySpot, mapReady]);

  return <div>
    <div style={{marginBottom:12}}>
      <h2 style={{fontFamily:FD,fontSize:22,fontWeight:700,margin:0,color:$.w}}>🗺️ Utah Fishing Map</h2>
      <div style={{fontSize:11,color:$.dm,marginTop:3}}>Click a pin to see what's biting today. Color = bite rating.</div>
      <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap",fontSize:10}}>
        <span style={{display:"flex",alignItems:"center",gap:4,color:$.dm}}><span style={{width:10,height:10,background:"#ef4444",borderRadius:"50%"}}></span>On Fire</span>
        <span style={{display:"flex",alignItems:"center",gap:4,color:$.dm}}><span style={{width:10,height:10,background:"#f97316",borderRadius:"50%"}}></span>Hot</span>
        <span style={{display:"flex",alignItems:"center",gap:4,color:$.dm}}><span style={{width:10,height:10,background:"#22c55e",borderRadius:"50%"}}></span>Good</span>
        <span style={{display:"flex",alignItems:"center",gap:4,color:$.dm}}><span style={{width:10,height:10,background:"#eab308",borderRadius:"50%"}}></span>Fair</span>
        <span style={{display:"flex",alignItems:"center",gap:4,color:$.dm}}><span style={{width:10,height:10,background:"#6b7280",borderRadius:"50%"}}></span>Slow</span>
        <span style={{display:"flex",alignItems:"center",gap:4,color:$.dm}}><span style={{width:10,height:10,background:"#3b82f6",borderRadius:"50%"}}></span>No data</span>
      </div>
    </div>
    <div id="fishmap" style={{height:"70vh",borderRadius:12,border:`1px solid ${$.sf}`,overflow:"hidden"}}></div>
  </div>;
}

const toBuyLink = (text) => {
  if (!text) return 'https://www.amazon.com/s?k=fishing';
  // Try each mapping
  for (const m of PRODUCT_MAP) {
    if (m.match.test(text)) {
      return `https://www.amazon.com/s?k=${encodeURIComponent(m.query)}`;
    }
  }
  // Fallback: clean up and search
  let q = text.replace(/#(\d+)/g, 'size $1').trim();
  q += ' fishing';
  return `https://www.amazon.com/s?k=${encodeURIComponent(q)}`;
};

// Split "Biting on: X, Y, Z" into individual items for separate buy buttons
const splitItems = (text) => {
  if (!text) return [];
  return text.split(/,\s*(?![^()]*\))/).map(s => s.trim()).filter(Boolean);
};

// ===== DETAIL VIEW =====
function Detail({spot,onBack,catches,user,spots,onLog,isPro,onPro}){
  const[tab,setTab]=useState("intel");const[rat,setRat]=useState(0);const[hov,setHov]=useState(0);const[cmt,setCmt]=useState("");
  const[revs,setRevs]=useState([]);
  const[hatchReports,setHatchReports]=useState([]);
  const[bitingReports,setBitingReports]=useState([]);

  // Load reviews, hatch reports, and what's biting from Supabase
  useEffect(()=>{(async()=>{
    const { data: revData } = await supabase.from('reviews').select('*, profiles(username)').eq('spot_id', spot.id).order('created_at', { ascending: false });
    if (revData) setRevs(revData.map(r => ({ user: r.profiles?.username || 'Angler', r: r.rating, c: r.comment || '', d: r.created_at?.split('T')[0] })));
    const { data: hData } = await supabase.from('hatch_reports').select('*, profiles(username)').eq('spot_id', spot.id).order('observed_at', { ascending: false }).limit(20);
    if (hData) setHatchReports(hData);
    const { data: bData } = await supabase.from('biting_reports').select('*, profiles(username)').eq('spot_id', spot.id).order('reported_at', { ascending: false }).limit(20);
    if (bData) setBitingReports(bData);
  })();},[spot.id]);

  const hd=HATCH[spot.name];const img=IMG[spot.name];const sc=catches.filter(x=>x.sid===spot.id);
  const guides=GUIDES[spot.name]||[];const gear=GEAR[spot.name]||[];
  const lb={};sc.forEach(x=>{if(!lb[x.user])lb[x.user]={t:0,sp:new Set(),me:new Set()};lb[x.user].t+=x.qty;lb[x.user].sp.add(x.species);lb[x.user].me.add(x.meth);});
  const leaders=Object.entries(lb).map(([u,d])=>({user:u,total:d.t,species:d.sp.size,methods:[...d.me].join(", ")})).sort((a,b)=>b.total-a.total);
  const spC={};sc.forEach(x=>{spC[x.species]=(spC[x.species]||0)+x.qty;});const spR=Object.entries(spC).sort((a,b)=>b[1]-a[1]);const mx=spR[0]?.[1]||1;
  const meC={};sc.forEach(x=>{meC[x.meth]=(meC[x.meth]||0)+x.qty;});const meR=Object.entries(meC).sort((a,b)=>b[1]-a[1]);

  const submitReview = async () => {
    if (!rat) return;
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return alert('Sign in first!');
    const { error } = await supabase.from('reviews').upsert({ user_id: session.user.id, spot_id: spot.id, rating: rat, comment: cmt.trim() || null }, { onConflict: 'user_id,spot_id' });
    if (error) return alert(error.message);
    setRevs([{ user: user.username, r: rat, c: cmt.trim(), d: new Date().toISOString().split('T')[0] }, ...revs.filter(r => r.user !== user.username)]);
    setRat(0); setCmt("");
  };

  const tabs=[{k:"intel",l:"🐟 What's Biting"},{k:"guides",l:"🎣 Guides"},{k:"gear",l:"🛒 Gear"},{k:"board",l:"🏆 Board"},{k:"catch",l:"📊 Caught"},{k:"rev",l:"⭐ Reviews"}];

  return <div>
    <button onClick={onBack} style={{background:"transparent",border:"none",color:$.a,cursor:"pointer",fontFamily:F,fontSize:12,marginBottom:12,padding:0}}>← Back to Spots</button>
    <div style={{borderRadius:14,overflow:"hidden",marginBottom:16,position:"relative"}}>
      {img&&<div style={{height:170,background:`url(${img}) center/cover`}}><div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 15%,#0c1a2bee)"}}/></div>}
      <div style={{position:img?"absolute":"relative",bottom:0,left:0,right:0,padding:"14px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <h2 style={{fontFamily:FD,fontSize:24,fontWeight:700,margin:0}}>{spot.name}</h2>
            <span style={{color:$.dm,fontSize:11}}>{spot.reg} · by {spot.by}</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            <span style={{background:"#0006",backdropFilter:"blur(4px)",padding:"4px 10px",borderRadius:10,color:$.w,fontSize:15,fontWeight:700}}>★ {spot.rating.toFixed(1)}</span>
            <button onClick={onLog} style={{background:$.g,border:"none",color:"#fff",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontFamily:F,fontWeight:600,fontSize:12}}>+ Log Catch</button>
          </div>
        </div>
        <p style={{color:$.dm,fontSize:11,lineHeight:1.5,margin:"6px 0 0",maxWidth:600}}>{spot.desc}</p>
      </div>
    </div>

    {hd?.cur&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
      {[{l:"Status",v:hd.cur.status,c:hd.cur.status==="Good"?$.g:$.w},{l:"Flow",v:hd.cur.flow,c:$.a},{l:"Temp",v:hd.cur.temp,c:$.a},{l:"Catches",v:spot.catches+sc.length,c:$.w}].map((s,i)=>(
        <div key={i} style={{background:$.cd,borderRadius:8,padding:"10px 12px",border:`1px solid ${$.bd}`,textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:s.c}}>{s.v}</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{s.l}</div></div>
      ))}
    </div>}

    <div style={{display:"flex",gap:2,marginBottom:14,borderBottom:`1px solid ${$.bd}`,overflowX:"auto"}}>
      {tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{background:"transparent",border:"none",borderBottom:tab===t.k?`2px solid ${$.a}`:"2px solid transparent",color:tab===t.k?$.aL:$.dm,padding:"7px 12px",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{t.l}</button>)}
    </div>

    {tab==="intel"&&<div>
      {/* WHAT'S BITING — community reports */}
      {bitingReports.length > 0 && <Card style={{marginBottom:14,border:`1px solid ${$.gD}35`}}><h3 style={h3}>🐟 What's Biting Right Now</h3>
        {bitingReports.map((br,i) => <div key={i} style={{padding:"8px 0",borderBottom:i<bitingReports.length-1?`1px solid ${$.bd}`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontWeight:600,fontSize:13}}>{br.species}</span>
            <span style={{background:br.bite_rating==='on_fire'?$.r+'20':br.bite_rating==='hot'?$.w+'20':br.bite_rating==='good'?$.g+'20':$.sf,
              color:br.bite_rating==='on_fire'?$.r:br.bite_rating==='hot'?$.w:br.bite_rating==='good'?$.g:$.dm,
              fontSize:10,padding:"2px 8px",borderRadius:6,fontWeight:600}}>
              {br.bite_rating==='on_fire'?'🔥 On Fire':br.bite_rating==='hot'?'🔥 Hot':br.bite_rating==='good'?'👍 Good':br.bite_rating==='fair'?'Fair':'Slow'}
            </span>
          </div>
          <div style={{color:$.a,fontSize:11,fontWeight:500,marginTop:2}}>Biting on: {br.biting_on}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
            {splitItems(br.biting_on).map((item,k)=><a key={k} href={toBuyLink(item)} target="_blank" rel="noopener" style={{background:$.g,color:"#fff",padding:"2px 8px",borderRadius:5,fontSize:9,fontWeight:600,textDecoration:"none"}}>🛒 {item.length>28?item.slice(0,26)+'…':item}</a>)}
          </div>
          <div style={{color:$.dm,fontSize:10}}>{br.method && `${br.method} · `}{br.time_of_day && `${br.time_of_day} · `}{br.reported_at}</div>
          {br.notes && <div style={{color:$.mt,fontSize:10,fontStyle:"italic",marginTop:2}}>{br.notes}</div>}
          <div style={{color:$.mt,fontSize:9,marginTop:2}}>— {br.profiles?.username || 'Angler'}</div>
        </div>)}
      </Card>}
      {bitingReports.length === 0 && !hd && <Card style={{textAlign:"center",padding:32,marginBottom:14}}><span style={{fontSize:32}}>🐟</span><p style={{color:$.dm,marginTop:8}}>No reports yet. Be the first — hit "What's Biting" above!</p></Card>}

      {/* HATCH DATA — editorial fly fishing intel */}
      {hd&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card><h3 style={h3}>🪰 Hatching Now</h3>{hd.active.map((h,i)=><div key={i} style={{padding:"7px 0",borderBottom:i<hd.active.length-1?`1px solid ${$.bd}`:"none"}}>
        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{h.name}</span><span style={{color:$.dm,fontSize:10}}>{h.size} · {h.time}</span></div>
        <div style={{color:$.mt,fontSize:10,marginTop:2}}>{h.note}</div>
      </div>)}</Card>
      <Card><h3 style={h3}>🎣 What to Use</h3>{hd.tactics.map((tc,i)=><div key={i} style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:$.a,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{tc.type}</div>
        {tc.flies.map((f,j)=><div key={j} style={{fontSize:10,color:$.dm,padding:"1px 0 1px 10px",position:"relative"}}><span style={{position:"absolute",left:0,color:$.mt}}>›</span>{f} <a href={toBuyLink(f)} target="_blank" rel="noopener" style={{color:$.g,fontSize:9,fontWeight:600,textDecoration:"none"}}>buy</a></div>)}
      </div>)}
      {hd.tip&&<div style={{background:$.wD+"18",borderRadius:7,padding:"7px 10px",marginTop:8,borderLeft:`3px solid ${$.w}`}}>
        <div style={{fontSize:9,fontWeight:600,color:$.w,textTransform:"uppercase",marginBottom:2}}>Pro Tip</div>
        <div style={{fontSize:10,color:$.dm,lineHeight:1.4}}>{hd.tip}</div>
      </div>}</Card>
      <Card style={{gridColumn:"1/-1"}}><h3 style={h3}>📅 Hatch Calendar</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:3}}>
          {hd.cal.map((m,i)=><div key={m.m} style={{background:i===MO?$.aD+"28":$.sf,borderRadius:6,padding:"6px 2px",textAlign:"center",border:i===MO?`1px solid ${$.a}44`:`1px solid ${$.bd}`}}>
            <div style={{fontSize:9,fontWeight:600,color:i===MO?$.aL:$.dm,marginBottom:3}}>{m.m}</div>
            {m.b.map((b,j)=><div key={j} style={{fontSize:7,color:$.dm,lineHeight:1.3}}>{b}</div>)}
          </div>)}
        </div>
        {!isPro&&<div style={{marginTop:10,background:$.proD+"12",borderRadius:7,padding:"7px 10px",border:`1px solid ${$.proD}25`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:10,color:$.dm}}>⚡ <span style={{color:$.pro,fontWeight:600}}>Pro:</span> Get push alerts when hatches fire</span>
          <button onClick={onPro} style={proBtn}>Upgrade</button>
        </div>}
      </Card>
      {hatchReports.length > 0 && <Card style={{gridColumn:"1/-1"}}><h3 style={h3}>📋 Community Hatch Reports</h3>
        {hatchReports.map((hr,i) => <div key={i} style={{padding:"6px 0",borderBottom:i<hatchReports.length-1?`1px solid ${$.bd}`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{hr.bug_name} {hr.bug_size||''}</span><span style={{color:$.dm,fontSize:10}}>{hr.observed_at}</span></div>
          <div style={{color:$.dm,fontSize:10}}>{hr.intensity && <span style={{color:$.g,fontWeight:500}}>{hr.intensity}</span>} {hr.time_of_day && `· ${hr.time_of_day}`} {hr.water_temp_f && `· ${hr.water_temp_f}°F`}</div>
          {hr.notes && <div style={{color:$.mt,fontSize:10,fontStyle:"italic"}}>{hr.notes}</div>}
          <div style={{color:$.mt,fontSize:9}}>— {hr.profiles?.username || 'Angler'}</div>
        </div>)}
      </Card>}
    </div>}
    </div>}

    {tab==="guides"&&<div>{guides.length===0?<Card style={{textAlign:"center",padding:32}}><span style={{fontSize:32}}>🎣</span><p style={{color:$.dm,marginTop:8}}>No guides listed yet.</p></Card>:
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {guides.map((g,i)=><Card key={i} style={{border:`1px solid ${g.featured?$.w+"35":$.bd}`}}>
          {g.featured&&<span style={{position:"absolute",top:12,right:14,background:$.w+"1a",color:$.w,fontSize:9,padding:"2px 8px",borderRadius:6,fontWeight:600,border:`1px solid ${$.w}25`}}>⭐ FEATURED</span>}
          <div style={{display:"flex",gap:14}}>
            <div style={{width:52,height:52,borderRadius:10,background:$.sf,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{g.img}</div>
            <div style={{flex:1}}>
              <h3 style={{margin:0,fontSize:15,fontWeight:600}}>{g.name}</h3>
              <div style={{display:"flex",alignItems:"center",gap:8,marginTop:3}}><span style={{color:$.w,fontSize:12}}>★ {g.rating}</span><span style={{color:$.dm,fontSize:10}}>({g.reviews})</span><span style={{color:$.g,fontSize:12,fontWeight:600}}>{g.price}</span></div>
              <p style={{color:$.dm,fontSize:11,margin:"5px 0"}}>{g.tagline}</p>
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>{g.specialties.map(s=><span key={s} style={{background:$.aD+"18",color:$.a,fontSize:9,padding:"2px 6px",borderRadius:5,border:`1px solid ${$.aD}20`}}>{s}</span>)}</div>
              {g.discount&&<div style={{background:$.gD+"18",borderRadius:5,padding:"4px 8px",display:"inline-block",marginBottom:6,border:`1px solid ${$.gD}25`}}><span style={{color:$.g,fontSize:10,fontWeight:600}}>🎁 {g.discount}</span></div>}
              <div style={{display:"flex",gap:8}}><button style={{background:$.a,border:"none",color:"#fff",padding:"7px 14px",borderRadius:7,cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:600}}>Book Trip</button><button style={{background:$.sf,border:`1px solid ${$.bd}`,color:$.dm,padding:"7px 12px",borderRadius:7,cursor:"pointer",fontFamily:F,fontSize:10}}>📞 {g.phone}</button></div>
            </div>
          </div>
        </Card>)}
        <div style={{background:$.sf,borderRadius:8,padding:"10px 14px",border:`1px dashed ${$.bd}`,textAlign:"center"}}><span style={{fontSize:11,color:$.dm}}>Are you a guide? </span><span style={{fontSize:11,color:$.a,cursor:"pointer",fontWeight:500}}>List on Stone Creek →</span></div>
      </div>}
    </div>}

    {tab==="gear"&&<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
        {gear.map((g,i)=><Card key={i} style={{padding:14}}>
          {g.hot&&<span style={{position:"absolute",top:8,right:8,background:$.r+"1a",color:$.r,fontSize:8,padding:"2px 6px",borderRadius:5,fontWeight:600,border:`1px solid ${$.r}20`}}>🔥 HOT</span>}
          {g.sponsor&&<span style={{fontSize:8,color:$.w,fontWeight:500}}>{g.sponsor}</span>}
          <div style={{fontSize:9,color:$.dm,textTransform:"uppercase",letterSpacing:1,marginBottom:3,marginTop:g.sponsor?2:0}}>{g.cat}</div>
          <div style={{fontSize:12,fontWeight:500,marginBottom:6}}>{g.name}</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:15,fontWeight:700,color:$.g}}>{g.price}</span><a href={toBuyLink(g.name)} target="_blank" rel="noopener" style={{background:$.a,color:"#fff",padding:"5px 12px",borderRadius:6,fontFamily:F,fontSize:10,fontWeight:600,textDecoration:"none"}}>Shop →</a></div>
        </Card>)}
      </div>
      {gear.length > 0 && <div style={{marginTop:10,fontSize:9,color:$.mt,textAlign:"center"}}>Affiliate links support Stone Creek at no extra cost</div>}
      {gear.length === 0 && <Card style={{textAlign:"center",padding:32}}><span style={{fontSize:32}}>🛒</span><p style={{color:$.dm,marginTop:8}}>No gear picks for this spot yet.</p></Card>}
      {!isPro&&gear.length>0&&<div style={{marginTop:12,background:$.proD+"12",borderRadius:8,padding:"9px 12px",border:`1px solid ${$.proD}25`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:10,color:$.dm}}>⚡ <span style={{color:$.pro,fontWeight:600}}>Pro</span> members get exclusive gear discounts</span>
        <button onClick={onPro} style={proBtn}>Upgrade</button>
      </div>}
    </div>}

    {tab==="board"&&<Card><h3 style={h3}>🏆 Top Anglers — {spot.name}</h3>
      {leaders.length===0?<p style={{color:$.dm,textAlign:"center"}}>No catches yet. Be the first!</p>:
        leaders.map((l,i)=><div key={l.user} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:i<leaders.length-1?`1px solid ${$.bd}`:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:i<3?18:12,width:26,textAlign:"center",fontWeight:700,color:$.dm}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}</span>
          <div><div style={{fontWeight:600,fontSize:13}}>{l.user}</div><div style={{color:$.dm,fontSize:9}}>{l.species} species · {l.methods}</div></div></div>
          <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:700,color:i===0?$.w:$.a}}>{l.total}</div><div style={{color:$.mt,fontSize:8,textTransform:"uppercase"}}>fish</div></div>
        </div>)}
    </Card>}

    {tab==="catch"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card><h3 style={h3}>Species Breakdown</h3>{spR.length===0?<p style={{color:$.dm}}>No data yet.</p>:spR.map(([sp,cnt])=><div key={sp} style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12}}>{sp}</span><span style={{color:$.a,fontWeight:600,fontSize:11}}>{cnt}</span></div>
        <div style={{background:$.sf,borderRadius:4,height:5}}><div style={{background:`linear-gradient(90deg,${$.a},${$.g})`,height:"100%",width:`${(cnt/mx)*100}%`,borderRadius:4}}/></div>
      </div>)}</Card>
      <Card><h3 style={h3}>Methods That Work</h3>{meR.length===0?<p style={{color:$.dm}}>No data yet.</p>:meR.map(([m,cnt])=><div key={m} style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontSize:12}}>{m}</span><span style={{color:$.w,fontWeight:600,fontSize:11}}>{cnt}</span></div>
        <div style={{background:$.sf,borderRadius:4,height:5}}><div style={{background:`linear-gradient(90deg,${$.w},${$.wD})`,height:"100%",width:`${(cnt/(meR[0]?.[1]||1))*100}%`,borderRadius:4}}/></div>
      </div>)}
      <div style={{marginTop:12,paddingTop:10,borderTop:`1px solid ${$.bd}`}}>
        <div style={{fontSize:10,fontWeight:600,color:$.dm,marginBottom:6}}>Recent Reports</div>
        {sc.slice(0,5).map((x,i)=><div key={i} style={{fontSize:10,color:$.dm,padding:"4px 0"}}><span style={{fontWeight:500}}>{x.user}</span> · {x.qty} {x.species} · {x.meth} <span style={{color:$.mt}}>· {x.date}</span>{x.notes&&<div style={{color:$.mt,fontSize:9,fontStyle:"italic"}}>{x.notes}</div>}</div>)}
      </div></Card>
    </div>}

    {tab==="rev"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card><h3 style={h3}>Rate This Spot</h3>
        <div style={{display:"flex",gap:4,marginBottom:10}}>{[1,2,3,4,5].map(s=><span key={s} onClick={()=>setRat(s)} onMouseEnter={()=>setHov(s)} onMouseLeave={()=>setHov(0)} style={{fontSize:22,cursor:"pointer",color:s<=(hov||rat)?$.w:$.mt}}>★</span>)}</div>
        <textarea value={cmt} onChange={e=>setCmt(e.target.value)} placeholder="Tips, conditions..." rows={3} style={{...ipt,resize:"vertical"}}/>
        <button onClick={submitReview} style={{background:$.w,border:"none",color:"#fff",padding:"8px 14px",borderRadius:7,cursor:"pointer",fontFamily:F,fontWeight:600,fontSize:11,marginTop:8}}>Submit</button>
      </Card>
      <Card style={{maxHeight:300,overflowY:"auto"}}><h3 style={h3}>Reviews ({revs.length})</h3>
        {revs.length===0?<p style={{color:$.dm,fontSize:11}}>No reviews yet. Be the first!</p>:revs.map((r,i)=><div key={i} style={{padding:"6px 0",borderBottom:i<revs.length-1?`1px solid ${$.bd}`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:11}}>👤 {r.user}</span><div>{[1,2,3,4,5].map(s=><span key={s} style={{color:s<=r.r?$.w:$.mt,fontSize:9}}>★</span>)}</div></div>
          {r.c&&<p style={{color:$.dm,fontSize:10,lineHeight:1.4,margin:"2px 0"}}>{r.c}</p>}
          <span style={{color:$.mt,fontSize:8}}>{r.d}</span>
        </div>)}
      </Card>
    </div>}
  </div>;
}

// ===== MY CATCHES =====
function MyCatches({uc,spots,onLog,isPro,onPro}){
  const nm=id=>spots.find(s=>s.id===id)?.name||"Unknown";const tot=uc.reduce((a,x)=>a+x.qty,0);const usp=new Set(uc.map(x=>x.species)).size;
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <h2 style={{fontFamily:FD,fontSize:24,fontWeight:700,margin:0}}>My Catches</h2>
      <button onClick={onLog} style={{background:`linear-gradient(135deg,${$.g},${$.gD})`,border:"none",color:"#fff",padding:"9px 16px",borderRadius:9,cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:600}}>+ Log Catch</button>
    </div>
    {uc.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
      <div style={{background:$.cd,borderRadius:8,padding:"10px 14px",border:`1px solid ${$.bd}`,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:$.a}}>{tot}</div><div style={{fontSize:9,color:$.dm}}>Total Fish</div></div>
      <div style={{background:$.cd,borderRadius:8,padding:"10px 14px",border:`1px solid ${$.bd}`,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:$.g}}>{usp}</div><div style={{fontSize:9,color:$.dm}}>Species</div></div>
      <div style={{background:$.cd,borderRadius:8,padding:"10px 14px",border:`1px solid ${$.bd}`,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:$.w}}>{uc.length}</div><div style={{fontSize:9,color:$.dm}}>Trips</div></div>
    </div>}

function Board({catches,spots}){

// ===== LOG CATCH MODAL — photos, multiple fish, length, lake spot =====
function CatchModal({close,user,spots,reload,sel,done}){
  const[sid,setSid]=useState(sel?.id||"");
  const[date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const[lakeSpot,setLakeSpot]=useState("");
  const[notes,setNotes]=useState("");
  const[photos,setPhotos]=useState([]);
  const[photoPreviews,setPhotoPreviews]=useState([]);
  const[saving,setSaving]=useState(false);

  // Multiple fish entries
  const[fish,setFish]=useState([{species:"",qty:1,length:"",meth:"Nymph"}]);
  const spot=spots.find(s=>s.id===sid);

  const addFish=()=>setFish([...fish,{species:"",qty:1,length:"",meth:"Nymph"}]);
  const removeFish=(i)=>setFish(fish.filter((_,j)=>j!==i));
  const updateFish=(i,key,val)=>{const nf=[...fish];nf[i]={...nf[i],[key]:val};setFish(nf);};

  const handlePhoto=(e)=>{
    const files=[...e.target.files];
    if(!files.length)return;
    const newPhotos=[];const newPreviews=[];
    let loaded=0;
    files.forEach(file=>{
      if(file.size>5*1024*1024) return alert(file.name+" is over 5MB — skipping it");
      newPhotos.push(file);
      const reader=new FileReader();
      reader.onload=(ev)=>{newPreviews.push(ev.target.result);loaded++;if(loaded===newPhotos.length){setPhotos([...photos,...newPhotos]);setPhotoPreviews([...photoPreviews,...newPreviews]);}};
      reader.readAsDataURL(file);
    });
    e.target.value="";
  };

  const removePhoto=(i)=>{setPhotos(photos.filter((_,j)=>j!==i));setPhotoPreviews(photoPreviews.filter((_,j)=>j!==i));};

  const submit = async () => {
    if (!sid) return alert("Pick a spot!");
    const validFish=fish.filter(f=>f.species);
    if (validFish.length===0) return alert("Add at least one fish!");
    setSaving(true);

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { setSaving(false); return alert("Sign in first!"); }

    // Upload photos if provided
    let photoUrls=[];
    for(const p of photos){
      const ext=p.name.split('.').pop();
      const path=`${session.user.id}/${Date.now()}_${Math.random().toString(36).slice(2,6)}.${ext}`;
      const { error:upErr } = await supabase.storage.from('catch-photos').upload(path, p);
      if(upErr){ console.error(upErr); }
      else {
        const { data:urlData } = supabase.storage.from('catch-photos').getPublicUrl(path);
        if(urlData?.publicUrl) photoUrls.push(urlData.publicUrl);
      }
    }
    const photoUrlStr=photoUrls.length?JSON.stringify(photoUrls):null;

    // Create a trip ID to group multiple fish together
    const tripId='trip_'+Date.now();

    // Insert each fish as a separate catch row, linked by trip_id
    for(const f of validFish){
      const { error } = await supabase.from('catches').insert({
        user_id: session.user.id, spot_id: sid, species: f.species,
        quantity: parseInt(f.qty) || 1, method: f.meth,
        length_inches: f.length ? parseFloat(f.length) : null,
        lake_spot: lakeSpot.trim() || null,
        notes: notes.trim() || null, caught_at: date,
        photo_url: photoUrlStr, trip_id: tripId,
      });
      if (error) { setSaving(false); return alert("Error: " + error.message); }
    }

    await reload();
    setSaving(false);
    done();
  };

  return <Overlay close={close}>
    <h2 style={{fontFamily:FD,fontSize:18,margin:"0 0 14px"}}>🐟 Log a Catch</h2>

    <label style={lbl}>WHERE</label>
    <select value={sid} onChange={e=>setSid(e.target.value)} style={ipt}><option value="">Select spot...</option>{spots.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div><label style={lbl}>DATE</label><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={ipt}/></div>
      <div><label style={lbl}>SPOT ON THE LAKE</label><input value={lakeSpot} onChange={e=>setLakeSpot(e.target.value)} placeholder="North shore, dam, inlet..." style={ipt}/></div>
    </div>

    {/* FISH ENTRIES */}
    <div style={{marginTop:10,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <label style={{...lbl,marginTop:0,marginBottom:0}}>FISH CAUGHT</label>
      <button onClick={addFish} style={{background:$.g,border:"none",color:"#fff",padding:"3px 10px",borderRadius:6,cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:600}}>+ Add Fish</button>
    </div>

    {fish.map((f,i)=><div key={i} style={{background:$.sf,borderRadius:8,padding:10,marginBottom:6,border:`1px solid ${$.bd}`,position:"relative"}}>
      {fish.length>1&&<span onClick={()=>removeFish(i)} style={{position:"absolute",top:6,right:8,color:$.r,cursor:"pointer",fontSize:14,fontWeight:700}}>×</span>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        <div><label style={{...lbl,fontSize:9,marginTop:0}}>SPECIES *</label><select value={f.species} onChange={e=>updateFish(i,'species',e.target.value)} style={{...ipt,fontSize:11,padding:"6px 8px"}}><option value="">Select...</option>{SP_OPT.map(s=><option key={s}>{s}</option>)}</select></div>
        <div><label style={{...lbl,fontSize:9,marginTop:0}}>METHOD</label><select value={f.meth} onChange={e=>updateFish(i,'meth',e.target.value)} style={{...ipt,fontSize:11,padding:"6px 8px"}}>{ME_OPT.map(m=><option key={m}>{m}</option>)}</select></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:4}}>
        <div><label style={{...lbl,fontSize:9,marginTop:4}}>COUNT</label><input type="number" min="1" value={f.qty} onChange={e=>updateFish(i,'qty',e.target.value)} style={{...ipt,fontSize:11,padding:"6px 8px"}}/></div>
        <div><label style={{...lbl,fontSize:9,marginTop:4}}>LENGTH (inches)</label><input type="number" step="0.5" value={f.length} onChange={e=>updateFish(i,'length',e.target.value)} placeholder="18.5" style={{...ipt,fontSize:11,padding:"6px 8px"}}/></div>
      </div>
    </div>)}

    {/* PHOTOS */}
    <label style={lbl}>PHOTOS</label>
    <input type="file" accept="image/*" multiple onChange={handlePhoto} style={{...ipt,padding:"8px",cursor:"pointer"}}/>
    {photoPreviews.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:8}}>
      {photoPreviews.map((p,i)=><div key={i} style={{position:"relative",width:80,height:80,borderRadius:8,overflow:"hidden",border:`1px solid ${$.bd}`}}>
        <img src={p} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="preview"/>
        <button onClick={()=>removePhoto(i)} style={{position:"absolute",top:2,right:2,background:$.r,border:"none",color:"#fff",borderRadius:"50%",width:18,height:18,cursor:"pointer",fontSize:10,lineHeight:"18px",padding:0}}>×</button>
      </div>)}
    </div>}

    <label style={lbl}>NOTES</label>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Conditions, rig setup, what worked..." rows={2} style={{...ipt,resize:"vertical"}}/>

    <div style={{display:"flex",gap:8,marginTop:10}}>
      <button onClick={submit} disabled={saving} style={{flex:1,background:`linear-gradient(135deg,${$.a},${$.aD})`,border:"none",color:"#fff",padding:"11px",borderRadius:8,cursor:"pointer",fontFamily:F,fontWeight:600,fontSize:12,opacity:saving?0.6:1}}>{saving?"Saving...":"Log Catch"}</button>
      <button onClick={close} style={{background:$.sf,border:`1px solid ${$.bd}`,color:$.dm,padding:"11px 18px",borderRadius:8,cursor:"pointer",fontFamily:F,fontSize:12}}>Cancel</button>
    </div>
  </Overlay>;
}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div><label style={lbl}>HOW'S THE BITE?</label><select value={biteRating} onChange={e=>setBiteRating(e.target.value)} style={ipt}><option value="slow">😴 Slow</option><option value="fair">😐 Fair</option><option value="good">👍 Good</option><option value="hot">🔥 Hot</option><option value="on_fire">🔥🔥 On Fire</option></select></div>
      <div><label style={lbl}>TIME OF DAY</label><input value={timeOfDay} onChange={e=>setTimeOfDay(e.target.value)} placeholder="Morning, 11am-2pm..." style={ipt}/></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div><label style={lbl}>WATER TEMP (°F)</label><input value={waterTemp} onChange={e=>setWaterTemp(e.target.value)} placeholder="42" type="number" style={ipt}/></div>
      <div></div>
    </div>
    <label style={lbl}>NOTES</label>
    <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Depth, color, rig setup, conditions..." rows={3} style={{...ipt,resize:"vertical"}}/>
    <button onClick={submit} disabled={saving} style={{width:"100%",background:`linear-gradient(135deg,${$.g},${$.gD})`,border:"none",color:"#fff",padding:"13px",borderRadius:10,cursor:"pointer",fontFamily:F,fontSize:15,fontWeight:600,marginTop:14,opacity:saving?0.6:1}}>{saving?"Submitting...":"Submit Report"}</button>
  </Overlay>;
}

function Card({children,style={}}){return <div style={{background:$.cd,borderRadius:12,padding:16,border:`1px solid ${$.bd}`,position:"relative",...style}}>{children}</div>;}
const h3={fontFamily:FD,fontSize:15,fontWeight:600,margin:"0 0 10px"};
const ddSt={background:$.sf,border:`1px solid ${$.bd}`,color:$.tx,padding:"7px 12px",borderRadius:8,fontFamily:F,fontSize:12};
const proBtn={background:$.pro,border:"none",color:"#fff",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:600};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
