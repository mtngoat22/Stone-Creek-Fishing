// Storage wrapper (uses localStorage for real deployment)
const storage = {
  async get(key) { 
    const v = localStorage.getItem(key); 
    return v ? { value: v } : null; 
  },
  async set(key, value) { 
    localStorage.setItem(key, value); 
    return { key, value }; 
  },
  async delete(key) { 
    localStorage.removeItem(key); 
    return { key, deleted: true }; 
  }
};

function App(){
  const[user,setUser]=useState(null);
  const[view,setView]=useState("spots");
  const[spots,setSpots]=useState(SPOTS0);
  const[catches,setCatches]=useState(CATCHES0);
  const[loading,setLoading]=useState(true);
  const[sel,setSel]=useState(null);
  const[modal,setModal]=useState(null);
  const[filter,setFilter]=useState("All Regions");
  const[sort,setSort]=useState("rating");
  const[isPro,setIsPro]=useState(false);
  const[auth,setAuth]=useState({username:"",email:"",password:""});
  const[signUp,setSignUp]=useState(false);

  useEffect(()=>{(async()=>{
    try{const r=await storage.get(SK.USER);if(r?.value)setUser(JSON.parse(r.value));}catch{}
    try{const r=await storage.get(SK.SPOTS);if(r?.value){const d=JSON.parse(r.value);if(d.length)setSpots(d);}}catch{}
    try{const r=await storage.get(SK.CATCHES);if(r?.value){const d=JSON.parse(r.value);if(d.length)setCatches(d);}}catch{}
    try{const r=await storage.get(SK.PRO);if(r?.value)setIsPro(JSON.parse(r.value));}catch{}
    setLoading(false);
  })();},[]);

  const sv=async(k,d,fn)=>{fn(d);try{await storage.set(k,JSON.stringify(d));}catch{}};
  const login=async()=>{if(!auth.username.trim())return;const u={username:auth.username.trim(),email:auth.email,joined:new Date().toISOString()};setUser(u);try{await storage.set(SK.USER,JSON.stringify(u));}catch{}};
  const goPro=async()=>{setIsPro(true);try{await storage.set(SK.PRO,JSON.stringify(true));}catch{}};

  if(loading)return <div style={{background:$.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F}}><link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Bitter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/><div style={{color:$.a,fontSize:15}}>Loading Stone Creek...</div></div>;

  if(!user)return(
    <div style={{background:$.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,position:"relative",overflow:"hidden"}}>

      <div style={{position:"absolute",bottom:-100,left:-60,width:350,height:350,borderRadius:"50%",background:`radial-gradient(circle,${$.gD}15,transparent 70%)`}}/>

        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:20,letterSpacing:4,color:$.stone,marginBottom:8}}>🪨</div>
          <h1 style={{fontFamily:FD,fontSize:36,fontWeight:800,margin:0,color:$.tx,letterSpacing:-0.5}}>Stone Creek</h1>
          <p style={{fontFamily:FD,color:$.w,fontSize:14,marginTop:2,fontWeight:500,fontStyle:"italic"}}>Fishing</p>
          <p style={{color:$.dm,fontSize:11,marginTop:10,letterSpacing:2,textTransform:"uppercase"}}>Know the water before you go</p>
        </div>
        <div style={{background:$.cd,borderRadius:14,padding:28,border:`1px solid ${$.bd}`}}>
          <h2 style={{fontFamily:FD,fontSize:18,margin:"0 0 20px",color:$.tx}}>{signUp?"Join the Creek":"Welcome Back"}</h2>
          {[{l:"USERNAME",k:"username",ph:"angler_name"},...(signUp?[{l:"EMAIL",k:"email",ph:"you@email.com",ty:"email"}]:[]),{l:"PASSWORD",k:"password",ph:"••••••••",ty:"password"}].map(f=>(
            <div key={f.k} style={{marginBottom:14}}>
              <label style={{...lbl,marginTop:0}}>{f.l}</label>
              <input value={auth[f.k]} onChange={e=>setAuth({...auth,[f.k]:e.target.value})} placeholder={f.ph} type={f.ty||"text"} onKeyDown={e=>e.key==="Enter"&&login()} style={ipt}/>
            </div>
          ))}
          <button onClick={login} style={{width:"100%",background:`linear-gradient(135deg,${$.a},${$.aD})`,border:"none",color:"#fff",padding:"13px",borderRadius:10,cursor:"pointer",fontFamily:F,fontSize:15,fontWeight:600,marginTop:4}}>{signUp?"Create Account":"Sign In"}</button>
          <div style={{textAlign:"center",marginTop:16,fontSize:13,color:$.dm}}>{signUp?"Have an account?":"New here?"}{" "}<span onClick={()=>setSignUp(!signUp)} style={{color:$.a,cursor:"pointer",fontWeight:500}}>{signUp?"Sign In":"Join Free"}</span></div>
        </div>
        <p style={{textAlign:"center",marginTop:20,fontSize:10,color:$.mt}}>Free forever · Community-powered fishing intel</p>
      </div>
    </div>
  );

  return(
    <div style={{background:$.bg,minHeight:"100vh",fontFamily:F,color:$.tx}}>

              <span style={{fontFamily:FD,fontSize:11,color:$.w,marginLeft:6,fontStyle:"italic",fontWeight:500}}>Fishing</span>
            </div>

              <button key={n.k} onClick={()=>{setView(n.k);setSel(null);}} style={{
                background:view===n.k?$.aD+"30":"transparent",border:view===n.k?`1px solid ${$.aD}44`:"1px solid transparent",

            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {isPro&&<span style={{background:$.proD+"35",color:$.pro,padding:"3px 8px",borderRadius:8,fontSize:9,fontWeight:600,border:`1px solid ${$.proD}50`,letterSpacing:1}}>PRO</span>}

        </div>
      </header>

      <main style={{maxWidth:1100,margin:"0 auto",padding:"20px 20px 80px"}}>

    {tab==="rev"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card><h3 style={h3}>Rate This Spot</h3>
        <div style={{display:"flex",gap:4,marginBottom:10}}>{[1,2,3,4,5].map(s=><span key={s} onClick={()=>setRat(s)} onMouseEnter={()=>setHov(s)} onMouseLeave={()=>setHov(0)} style={{fontSize:22,cursor:"pointer",color:s<=(hov||rat)?$.w:$.mt}}>★</span>)}</div>
        <textarea value={cmt} onChange={e=>setCmt(e.target.value)} placeholder="Tips, conditions..." rows={3} style={{...ipt,resize:"vertical"}}/>
        <button onClick={()=>{if(!rat)return;setRevs([{user:user.username,r:rat,c:cmt.trim(),d:new Date().toISOString().split("T")[0]},...revs]);const up=spots.map(s=>{if(s.id===spot.id){const nr=[...s.ratings,rat];return{...s,ratings:nr,rating:nr.reduce((a,b)=>a+b)/nr.length};}return s;});saveSpots(up);setRat(0);setCmt("");}} style={{background:$.w,border:"none",color:"#fff",padding:"8px 14px",borderRadius:7,cursor:"pointer",fontFamily:F,fontWeight:600,fontSize:11,marginTop:8}}>Submit</button>
      </Card>
      <Card style={{maxHeight:300,overflowY:"auto"}}><h3 style={h3}>Reviews ({revs.length})</h3>
        {revs.map((r,i)=><div key={i} style={{padding:"6px 0",borderBottom:i<revs.length-1?`1px solid ${$.bd}`:"none"}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:11}}>👤 {r.user}</span><div>{[1,2,3,4,5].map(s=><span key={s} style={{color:s<=r.r?$.w:$.mt,fontSize:9}}>★</span>)}</div></div>
          {r.c&&<p style={{color:$.dm,fontSize:10,lineHeight:1.4,margin:"2px 0"}}>{r.c}</p>}
          <span style={{color:$.mt,fontSize:8}}>{r.d}</span>
        </div>)}
      </Card>
    </div>}
  </div>;
}

function MyCatches({uc,spots,onLog,isPro,onPro}){
  const nm=id=>spots.find(s=>s.id===id)?.name||"Unknown";const tot=uc.reduce((a,x)=>a+x.qty,0);const usp=new Set(uc.map(x=>x.species)).size;
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <h2 style={{fontFamily:FD,fontSize:24,fontWeight:700,margin:0}}>My Catches</h2>
      <button onClick={onLog} style={{background:`linear-gradient(135deg,${$.g},${$.gD})`,border:"none",color:"#fff",padding:"9px 16px",borderRadius:9,cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:600}}>+ Log Catch</button>
    </div>
    {uc.length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
      <div style={{background:$.cd,borderRadius:8,padding:"10px 14px",border:`1px solid ${$.bd}`,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:$.a}}>{tot}</div><div style={{fontSize:9,color:$.dm}}>Total Fish</div></div>
      <div style={{background:$.cd,borderRadius:8,padding:"10px 14px",border:`1px solid ${$.bd}`,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:$.g}}>{usp}</div><div style={{fontSize:9,color:$.dm}}>Species</div></div>
      <div style={{background:$.cd,borderRadius:8,padding:"10px 14px",border:`1px solid ${$.bd}`,textAlign:"center"}}><div style={{fontSize:20,fontWeight:700,color:$.w}}>{uc.length}</div><div style={{fontSize:9,color:$.dm}}>Trips</div></div>
    </div>}
    {!isPro&&uc.length>0&&<div style={{background:$.proD+"12",borderRadius:8,padding:"9px 12px",border:`1px solid ${$.proD}25`,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <span style={{fontSize:10,color:$.dm}}>⚡ <span style={{color:$.pro,fontWeight:600}}>Pro:</span> Unlock seasonal trends & personal analytics</span>
      <button onClick={onPro} style={proBtn}>Upgrade</button>
    </div>}
    {uc.length===0?<Card style={{textAlign:"center",padding:36}}><span style={{fontSize:36}}>🎣</span><h3 style={{fontFamily:FD,margin:"8px 0 4px"}}>No catches yet</h3><p style={{color:$.dm,fontSize:12}}>Go fish!</p></Card>:
      uc.sort((a,b)=>new Date(b.date)-new Date(a.date)).map((x,i)=><div key={i} style={{background:$.cd,borderRadius:10,padding:"12px 16px",border:`1px solid ${$.bd}`,marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:22}}>🐟</span><div><div style={{fontWeight:600,fontSize:13}}>{x.species}</div><div style={{color:$.dm,fontSize:10}}>📍 {nm(x.sid)} · {x.meth} · {x.date}</div>{x.notes&&<div style={{color:$.mt,fontSize:9,fontStyle:"italic"}}>{x.notes}</div>}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:700,color:$.a}}>{x.qty}</div><div style={{color:$.mt,fontSize:8,textTransform:"uppercase"}}>caught</div></div>
      </div>)
    }
  </div>;
}

function Board({catches,spots}){
  const[sf,setSf]=useState("all");const fc=sf==="all"?catches:catches.filter(x=>x.sid===sf);
  const lb={};fc.forEach(x=>{if(!lb[x.user])lb[x.user]={t:0,sp:new Set(),st:new Set()};lb[x.user].t+=x.qty;lb[x.user].sp.add(x.species);lb[x.user].st.add(x.sid);});
  const leaders=Object.entries(lb).map(([u,d])=>({user:u,total:d.t,species:d.sp.size,spots:d.st.size})).sort((a,b)=>b.total-a.total);
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{fontFamily:FD,fontSize:24,fontWeight:700,margin:0}}>🏆 Leaderboard</h2>
      <select value={sf} onChange={e=>setSf(e.target.value)} style={ddSt}><option value="all">All Spots</option>{spots.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
    </div>
    {leaders.map((l,i)=><div key={l.user} style={{background:i<3?$.cdH:$.cd,borderRadius:10,padding:"12px 18px",border:`1px solid ${i<3?$.aD+"35":$.bd}`,marginBottom:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:i<3?20:12,width:28,textAlign:"center",fontWeight:700,color:$.dm}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}</span><div><div style={{fontWeight:600,fontSize:13}}>{l.user}</div><div style={{color:$.dm,fontSize:9}}>{l.species} species · {l.spots} spots</div></div></div>
      <div style={{textAlign:"right"}}><div style={{fontSize:20,fontWeight:700,color:i===0?$.w:$.a}}>{l.total}</div><div style={{color:$.mt,fontSize:8,textTransform:"uppercase"}}>fish</div></div>
    </div>)}
  </div>;
}

function Deals({isPro,onPro}){
  const all=[...Object.values(GEAR)].flat();
  return <div>
    <h2 style={{fontFamily:FD,fontSize:24,fontWeight:700,margin:"0 0 4px"}}>🛒 Gear Picks</h2>
    <p style={{color:$.dm,marginBottom:14,fontSize:12}}>Community-recommended gear for Utah waters</p>
    {!isPro&&<div style={{background:`linear-gradient(135deg,${$.proD}18,${$.cd})`,borderRadius:12,padding:16,border:`1px solid ${$.proD}35`,marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:24}}>⚡</span><div><div style={{fontWeight:600,fontSize:13,color:$.pro}}>Pro members save 10-20% on partner gear</div><div style={{color:$.dm,fontSize:10,marginTop:2}}>Exclusive deals from top brands</div></div></div>
      <button onClick={onPro} style={{background:`linear-gradient(135deg,${$.pro},${$.proD})`,border:"none",color:"#fff",padding:"8px 14px",borderRadius:8,cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:600}}>Go Pro</button>
    </div>}
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:10}}>
      {all.map((g,i)=><Card key={i} style={{padding:14}}>{g.hot&&<span style={{position:"absolute",top:8,right:8,background:$.r+"18",color:$.r,fontSize:8,padding:"2px 6px",borderRadius:5,fontWeight:600}}>🔥</span>}
        {g.sponsor&&<span style={{fontSize:8,color:$.w,fontWeight:500}}>{g.sponsor}</span>}
        <div style={{fontSize:9,color:$.dm,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{g.cat}</div>
        <div style={{fontSize:11,fontWeight:500,marginBottom:6}}>{g.name}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:14,fontWeight:700,color:$.g}}>{g.price}</span><button style={{background:$.a,border:"none",color:"#fff",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:600}}>Shop →</button></div>
      </Card>)}
    </div>
  </div>;
}

function Feed({catches,spots}){
  const nm=id=>spots.find(s=>s.id===id)?.name||"Unknown";
  return <div>
    <h2 style={{fontFamily:FD,fontSize:24,fontWeight:700,margin:"0 0 4px"}}>📊 Community Feed</h2>
    <p style={{color:$.dm,marginBottom:14,fontSize:12}}>Latest from all anglers</p>
    {[...catches].sort((a,b)=>new Date(b.date)-new Date(a.date)).map((x,i)=><div key={i} style={{background:$.cd,borderRadius:10,padding:"10px 14px",border:`1px solid ${$.bd}`,marginBottom:6}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:28,height:28,borderRadius:"50%",background:$.aD+"25",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>🐟</div>
      <div><div style={{fontSize:11}}><span style={{fontWeight:600}}>{x.user}</span> caught <span style={{color:$.a,fontWeight:600}}>{x.qty} {x.species}</span></div><div style={{color:$.dm,fontSize:9}}>📍 {nm(x.sid)} · {x.meth} · {x.date}</div>{x.notes&&<div style={{color:$.mt,fontSize:9,fontStyle:"italic"}}>{x.notes}</div>}</div></div>
    </div>)}
  </div>;
}

function AddModal({close,user,spots,save}){
  const[f,setF]=useState({name:"",reg:"Wasatch",species:[],desc:""});
  return <Overlay close={close}>
    <h2 style={{fontFamily:FD,fontSize:18,margin:"0 0 14px"}}>Add Fishing Spot</h2>
    <label style={lbl}>SPOT NAME *</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Mirror Lake" style={ipt}/>
    <label style={lbl}>REGION</label><select value={f.reg} onChange={e=>setF({...f,reg:e.target.value})} style={ipt}>{REGS.filter(r=>r!=="All Regions").map(r=><option key={r}>{r}</option>)}</select>
    <label style={lbl}>SPECIES *</label><select onChange={e=>{if(e.target.value&&!f.species.includes(e.target.value))setF({...f,species:[...f.species,e.target.value]});e.target.value="";}} style={ipt}><option value="">Select...</option>{SP_OPT.filter(s=>!f.species.includes(s)).map(s=><option key={s}>{s}</option>)}</select>
    <div style={{display:"flex",gap:4,flexWrap:"wrap",margin:"6px 0 8px"}}>{f.species.map(s=><span key={s} style={{background:$.aD+"1a",color:$.a,fontSize:10,padding:"2px 8px",borderRadius:6,display:"flex",alignItems:"center",gap:3,border:`1px solid ${$.aD}20`}}>{s}<span onClick={()=>setF({...f,species:f.species.filter(x=>x!==s)})} style={{cursor:"pointer",color:$.r}}>×</span></span>)}</div>
    <label style={lbl}>DESCRIPTION</label><textarea value={f.desc} onChange={e=>setF({...f,desc:e.target.value})} placeholder="Tips, access..." rows={3} style={{...ipt,resize:"vertical"}}/>
    <div style={{display:"flex",gap:8,marginTop:10}}>
      <button onClick={()=>{if(!f.name.trim()||!f.species.length)return;save([...spots,{id:"s"+Date.now(),name:f.name.trim(),reg:f.reg,species:f.species,rating:0,ratings:[],catches:0,by:user.username,desc:f.desc.trim()||"No description."}]);close();}} style={{flex:1,background:$.g,border:"none",color:"#fff",padding:"11px",borderRadius:8,cursor:"pointer",fontFamily:F,fontWeight:600,fontSize:12}}>Add Spot</button>
      <button onClick={close} style={{background:$.sf,border:`1px solid ${$.bd}`,color:$.dm,padding:"11px 18px",borderRadius:8,cursor:"pointer",fontFamily:F,fontSize:12}}>Cancel</button>
    </div>
  </Overlay>;
}

function CatchModal({close,user,spots,catches,save,sel}){
  const[f,setF]=useState({sid:sel?.id||"",species:"",qty:1,date:new Date().toISOString().split("T")[0],meth:"Nymph",notes:""});const spot=spots.find(s=>s.id===f.sid);
  return <Overlay close={close}>
    <h2 style={{fontFamily:FD,fontSize:18,margin:"0 0 14px"}}>🐟 Log a Catch</h2>
    <label style={lbl}>WHERE</label><select value={f.sid} onChange={e=>setF({...f,sid:e.target.value,species:""})} style={ipt}><option value="">Select...</option>{spots.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}</select>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div><label style={lbl}>SPECIES</label><select value={f.species} onChange={e=>setF({...f,species:e.target.value})} style={ipt}><option value="">Select...</option>{(spot?.species||SP_OPT).map(s=><option key={s}>{s}</option>)}</select></div>
      <div><label style={lbl}>METHOD</label><select value={f.meth} onChange={e=>setF({...f,meth:e.target.value})} style={ipt}>{ME_OPT.map(m=><option key={m}>{m}</option>)}</select></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div><label style={lbl}>COUNT</label><input type="number" min="1" value={f.qty} onChange={e=>setF({...f,qty:e.target.value})} style={ipt}/></div>
      <div><label style={lbl}>DATE</label><input type="date" value={f.date} onChange={e=>setF({...f,date:e.target.value})} style={ipt}/></div>
    </div>
    <label style={lbl}>NOTES</label><textarea value={f.notes} onChange={e=>setF({...f,notes:e.target.value})} placeholder="Fly/lure, conditions, size..." rows={2} style={{...ipt,resize:"vertical"}}/>
    <div style={{display:"flex",gap:8,marginTop:10}}>
      <button onClick={()=>{if(!f.sid||!f.species)return;save([...catches,{...f,user:user.username,qty:parseInt(f.qty)||1,id:"c"+Date.now()}]);close();}} style={{flex:1,background:`linear-gradient(135deg,${$.a},${$.aD})`,border:"none",color:"#fff",padding:"11px",borderRadius:8,cursor:"pointer",fontFamily:F,fontWeight:600,fontSize:12}}>Log Catch</button>
      <button onClick={close} style={{background:$.sf,border:`1px solid ${$.bd}`,color:$.dm,padding:"11px 18px",borderRadius:8,cursor:"pointer",fontFamily:F,fontSize:12}}>Cancel</button>
    </div>
  </Overlay>;
}

function Card({children,style={}}){return <div style={{background:$.cd,borderRadius:12,padding:16,border:`1px solid ${$.bd}`,position:"relative",...style}}>{children}</div>;}
const h3={fontFamily:FD,fontSize:15,fontWeight:600,margin:"0 0 10px"};
const ddSt={background:$.sf,border:`1px solid ${$.bd}`,color:$.tx,padding:"7px 12px",borderRadius:8,fontFamily:F,fontSize:12};
const proBtn={background:$.pro,border:"none",color:"#fff",padding:"4px 10px",borderRadius:6,cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:600};



ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
