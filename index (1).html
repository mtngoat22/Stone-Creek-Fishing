  const[view,setView]=useState("spots");
  const[spots,setSpots]=useState(SPOTS0);
  const[catches,setCatches]=useState(CATCHES0);
  const[loading,setLoading]=useState(true);
  const[sel,setSel]=useState(null);
  const[modal,setModal]=useState(null);
  const[filter,setFilter]=useState("All Regions");
  const[sort,setSort]=useState("rating");
  const[isPro,setIsPro]=useState(false);
  const[auth,setAuth]=useState({username:"",email:"",password:""});
  const[signUp,setSignUp]=useState(false);

  useEffect(()=>{(async()=>{
    try{const r=await storage.get(SK.USER);if(r?.value)setUser(JSON.parse(r.value));}catch{}
    try{const r=await storage.get(SK.SPOTS);if(r?.value){const d=JSON.parse(r.value);if(d.length)setSpots(d);}}catch{}
    try{const r=await storage.get(SK.CATCHES);if(r?.value){const d=JSON.parse(r.value);if(d.length)setCatches(d);}}catch{}
    try{const r=await storage.get(SK.PRO);if(r?.value)setIsPro(JSON.parse(r.value));}catch{}
    setLoading(false);
  })();},[]);

  const sv=async(k,d,fn)=>{fn(d);try{await storage.set(k,JSON.stringify(d));}catch{}};
  const login=async()=>{if(!auth.username.trim())return;const u={username:auth.username.trim(),email:auth.email,joined:new Date().toISOString()};setUser(u);try{await storage.set(SK.USER,JSON.stringify(u));}catch{}};
  const goPro=async()=>{setIsPro(true);try{await storage.set(SK.PRO,JSON.stringify(true));}catch{}};

  if(loading)return <div style={{background:$.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F}}><link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Bitter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/><div style={{color:$.a,fontSize:15}}>Loading Stone Creek...</div></div>;

  // AUTH SCREEN
  if(!user)return(
    <div style={{background:$.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:F,position:"relative",overflow:"hidden"}}>
      <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Bitter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      <div style={{position:"absolute",top:-120,right:-80,width:400,height:400,borderRadius:"50%",background:`radial-gradient(circle,${$.aD}12,transparent 70%)`}}/>
      <div style={{position:"absolute",bottom:-100,left:-60,width:350,height:350,borderRadius:"50%",background:`radial-gradient(circle,${$.gD}15,transparent 70%)`}}/>
      <div style={{width:"100%",maxWidth:400,padding:20,zIndex:1}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:20,letterSpacing:4,color:$.stone,marginBottom:8}}>🪨</div>
          <h1 style={{fontFamily:FD,fontSize:36,fontWeight:800,margin:0,color:$.tx,letterSpacing:-0.5}}>Stone Creek</h1>
          <p style={{fontFamily:FD,color:$.w,fontSize:14,marginTop:2,fontWeight:500,fontStyle:"italic"}}>Fishing</p>
          <p style={{color:$.dm,fontSize:11,marginTop:10,letterSpacing:2,textTransform:"uppercase"}}>Know the water before you go</p>
        </div>
        <div style={{background:$.cd,borderRadius:14,padding:28,border:`1px solid ${$.bd}`}}>
          <h2 style={{fontFamily:FD,fontSize:18,margin:"0 0 20px",color:$.tx}}>{signUp?"Join the Creek":"Welcome Back"}</h2>
          {[{l:"USERNAME",k:"username",ph:"angler_name"},...(signUp?[{l:"EMAIL",k:"email",ph:"you@email.com",ty:"email"}]:[]),{l:"PASSWORD",k:"password",ph:"••••••••",ty:"password"}].map(f=>(
            <div key={f.k} style={{marginBottom:14}}>
              <label style={{...lbl,marginTop:0}}>{f.l}</label>
              <input value={auth[f.k]} onChange={e=>setAuth({...auth,[f.k]:e.target.value})} placeholder={f.ph} type={f.ty||"text"} onKeyDown={e=>e.key==="Enter"&&login()} style={ipt}/>
            </div>
          ))}
          <button onClick={login} style={{width:"100%",background:`linear-gradient(135deg,${$.a},${$.aD})`,border:"none",color:"#fff",padding:"13px",borderRadius:10,cursor:"pointer",fontFamily:F,fontSize:15,fontWeight:600,marginTop:4}}>{signUp?"Create Account":"Sign In"}</button>
          <div style={{textAlign:"center",marginTop:16,fontSize:13,color:$.dm}}>{signUp?"Have an account?":"New here?"}{" "}<span onClick={()=>setSignUp(!signUp)} style={{color:$.a,cursor:"pointer",fontWeight:500}}>{signUp?"Sign In":"Join Free"}</span></div>
        </div>
        <p style={{textAlign:"center",marginTop:20,fontSize:10,color:$.mt}}>Free forever · Community-powered fishing intel</p>
      </div>
    </div>
  );

  const fSpots=spots.filter(s=>filter==="All Regions"||s.reg===filter).sort((a,b)=>sort==="rating"?b.rating-a.rating:sort==="catches"?b.catches-a.catches:a.name.localeCompare(b.name));

  return(
    <div style={{background:$.bg,minHeight:"100vh",fontFamily:F,color:$.tx}}>
      <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Bitter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
      {/* HEADER */}
      <header style={{background:$.bg2,borderBottom:`1px solid ${$.bd}`,padding:"0 20px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>{setView("spots");setSel(null);}}>
            <span style={{fontSize:16,color:$.stone}}>🪨</span>
            <div style={{lineHeight:1}}>
              <span style={{fontFamily:FD,fontSize:17,fontWeight:700,color:$.tx}}>Stone Creek</span>
              <span style={{fontFamily:FD,fontSize:11,color:$.w,marginLeft:6,fontStyle:"italic",fontWeight:500}}>Fishing</span>
            </div>
          </div>
          <nav style={{display:"flex",gap:2}}>
            {[{k:"spots",l:"Spots",i:"📍"},{k:"log",l:"My Catches",i:"📋"},{k:"board",l:"Board",i:"🏆"},{k:"deals",l:"Gear",i:"🛒"},{k:"feed",l:"Feed",i:"📊"}].map(n=>(
              <button key={n.k} onClick={()=>{setView(n.k);setSel(null);}} style={{
                background:view===n.k?$.aD+"30":"transparent",border:view===n.k?`1px solid ${$.aD}44`:"1px solid transparent",
                color:view===n.k?$.aL:$.dm,padding:"6px 11px",borderRadius:8,cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:500,display:"flex",alignItems:"center",gap:4
              }}><span style={{fontSize:12}}>{n.i}</span>{n.l}</button>
            ))}
          </nav>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {isPro&&<span style={{background:$.proD+"35",color:$.pro,padding:"3px 8px",borderRadius:8,fontSize:9,fontWeight:600,border:`1px solid ${$.proD}50`,letterSpacing:1}}>PRO</span>}
            {!isPro&&<button onClick={()=>setModal("pro")} style={{background:`linear-gradient(135deg,${$.pro},${$.proD})`,border:"none",color:"#fff",padding:"4px 10px",borderRadius:7,cursor:"pointer",fontFamily:F,fontSize:10,fontWeight:600}}>Go Pro</button>}
            <span style={{background:$.sf,padding:"4px 10px",borderRadius:12,fontSize:11,color:$.dm}}>👤 {user.username}</span>
          </div>
        </div>
      </header>

      <main style={{maxWidth:1100,margin:"0 auto",padding:"20px 20px 80px"}}>
        {view==="spots"&&!sel&&<SpotsList spots={fSpots} filter={filter} setFilter={setFilter} sort={sort} setSort={setSort} onSel={setSel} onAdd={()=>setModal("add")} catches={catches}/>}
        {view==="spots"&&sel&&<Detail spot={sel} onBack={()=>setSel(null)} catches={catches} user={user} spots={spots} saveSpots={d=>sv(SK.SPOTS,d,setSpots)} onLog={()=>setModal("catch")} isPro={isPro} onPro={()=>setModal("pro")}/>}
        {view==="log"&&<MyCatches uc={catches.filter(x=>x.user===user.username)} spots={spots} onLog={()=>setModal("catch")} isPro={isPro} onPro={()=>setModal("pro")}/>}
        {view==="board"&&<Board catches={catches} spots={spots}/>}
        {view==="deals"&&<Deals isPro={isPro} onPro={()=>setModal("pro")}/>}
        {view==="feed"&&<Feed catches={catches} spots={spots}/>}
      </main>

      {modal==="add"&&<AddModal close={()=>setModal(null)} user={user} spots={spots} save={d=>sv(SK.SPOTS,d,setSpots)}/>}
      {modal==="catch"&&<CatchModal close={()=>setModal(null)} user={user} spots={spots} catches={catches} save={d=>sv(SK.CATCHES,d,setCatches)} sel={sel}/>}
      {modal==="pro"&&<ProModal close={()=>setModal(null)} go={goPro}/>}
    </div>
  );
}

function ProModal({close,go}){
  return <Overlay close={close}><div style={{textAlign:"center",marginBottom:24}}>
    <div style={{fontSize:44,marginBottom:6}}>⚡</div>
    <h2 style={{fontFamily:FD,fontSize:24,fontWeight:800,margin:0,color:$.tx}}>Stone Creek <span style={{color:$.pro}}>Pro</span></h2>
    <p style={{color:$.dm,fontSize:12,marginTop:6}}>Level up your fishing intel</p>
  </div>
  <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
    {[{i:"🔔",t:"Real-time Hatch Alerts",d:"Push notifications when hatches fire"},{i:"📈",t:"Catch Analytics",d:"Personal stats & seasonal trends"},{i:"📍",t:"Private Spot Pins",d:"Save secret spots only you see"},{i:"📅",t:"Historical Data",d:"What caught this week last year"},{i:"🏷️",t:"Exclusive Gear Deals",d:"Pro-only brand discounts"},{i:"🚫",t:"No Sponsored Content",d:"Clean, ad-free experience"}].map((f,i)=>(
      <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{fontSize:18}}>{f.i}</span><div><div style={{fontWeight:600,fontSize:12}}>{f.t}</div><div style={{color:$.dm,fontSize:10}}>{f.d}</div></div></div>
    ))}
  </div>
  <div style={{textAlign:"center",marginBottom:14}}><div style={{fontSize:32,fontWeight:800,color:$.tx}}>$7<span style={{fontSize:14,fontWeight:400,color:$.dm}}>/month</span></div><div style={{color:$.dm,fontSize:11}}>Cancel anytime · 7-day free trial</div></div>
  <button onClick={()=>{go();close();}} style={{width:"100%",background:`linear-gradient(135deg,${$.pro},${$.proD})`,border:"none",color:"#fff",padding:"13px",borderRadius:10,cursor:"pointer",fontFamily:F,fontSize:15,fontWeight:700}}>Start Free Trial</button>
  <button onClick={close} style={{width:"100%",background:"transparent",border:"none",color:$.dm,padding:"10px",cursor:"pointer",fontFamily:F,fontSize:12,marginTop:6}}>Maybe later</button>
  </Overlay>;
}

function Overlay({close,children}){
  return <div style={{position:"fixed",inset:0,background:"#000b",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,padding:20}} onClick={close}>
    <div onClick={e=>e.stopPropagation()} style={{background:$.cd,borderRadius:16,padding:28,border:`1px solid ${$.bd}`,maxWidth:440,width:"100%",maxHeight:"85vh",overflowY:"auto"}}>{children}</div>
  </div>;
}

function SpotsList({spots,filter,setFilter,sort,setSort,onSel,onAdd,catches}){
  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
      <div>
        <h2 style={{fontFamily:FD,fontSize:24,fontWeight:700,margin:0}}>Fishing Spots</h2>
        <p style={{color:$.dm,marginTop:2,fontSize:12}}>Tap any spot for intel, guides & gear</p>
      </div>
      <button onClick={onAdd} style={{background:`linear-gradient(135deg,${$.g},${$.gD})`,border:"none",color:"#fff",padding:"9px 16px",borderRadius:9,cursor:"pointer",fontFamily:F,fontSize:12,fontWeight:600}}>+ Add Spot</button>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      <select value={filter} onChange={e=>setFilter(e.target.value)} style={ddSt}>{REGS.map(r=><option key={r}>{r}</option>)}</select>
      <select value={sort} onChange={e=>setSort(e.target.value)} style={ddSt}><option value="rating">Top Rated</option><option value="catches">Most Catches</option><option value="name">A-Z</option></select>
    </div>
    <div style={{background:`linear-gradient(135deg,${$.cd},${$.aD}0c)`,borderRadius:10,padding:"12px 16px",border:`1px solid ${$.bd}`,marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:20}}>🪰</span><div><div style={{fontSize:12,fontWeight:600}}>Spring hatch season is here</div><div style={{color:$.dm,fontSize:10}}>BWOs firing on the Provo. Book a guided trip.</div></div></div>
      <span style={{fontSize:8,color:$.mt,textTransform:"uppercase",letterSpacing:1}}>Sponsored</span>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:12}}>
      {spots.map(sp=>{const img=IMG[sp.name];const hd=HATCH[sp.name];const sc=catches.filter(x=>x.sid===sp.id);const guides=GUIDES[sp.id];
        return <div key={sp.id} onClick={()=>onSel(sp)} style={{background:$.cd,borderRadius:12,border:`1px solid ${$.bd}`,cursor:"pointer",overflow:"hidden",transition:"all .2s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=$.aD;e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=$.bd;e.currentTarget.style.transform="none";}}>
          {img&&<div style={{height:120,background:`url(${img}) center/cover`,position:"relative"}}>
            <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 25%,#132639ee)"}}/>
            <div style={{position:"absolute",bottom:8,left:12,display:"flex",gap:5}}>
              <span style={{background:"#0008",backdropFilter:"blur(4px)",padding:"2px 8px",borderRadius:10,color:$.w,fontSize:12,fontWeight:600}}>★ {sp.rating.toFixed(1)}</span>
              {hd?.cur&&<span style={{background:"#0008",backdropFilter:"blur(4px)",color:hd.cur.status==="Good"?$.g:$.w,fontSize:10,padding:"3px 7px",borderRadius:8,fontWeight:600}}>{hd.cur.status}</span>}
            </div>
            {guides&&<span style={{position:"absolute",top:8,right:10,background:$.w+"dd",color:"#1a1a1a",fontSize:8,padding:"2px 7px",borderRadius:5,fontWeight:700,letterSpacing:0.5}}>GUIDES</span>}
          </div>}
          <div style={{padding:"12px 16px 14px"}}>
            <h3 style={{margin:0,fontSize:15,fontWeight:600}}>{sp.name}</h3>
            <span style={{fontSize:10,color:$.dm}}>{sp.reg}</span>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",margin:"8px 0"}}>
              {sp.species.slice(0,3).map(s=><span key={s} style={{background:$.aD+"1a",color:$.a,fontSize:9,padding:"2px 7px",borderRadius:6,fontWeight:500,border:`1px solid ${$.aD}25`}}>{s}</span>)}
            </div>
            {hd?.active?.length>0&&<div style={{background:$.gD+"15",borderRadius:6,padding:"5px 10px",marginBottom:8,border:`1px solid ${$.gD}25`}}>
              <span style={{fontSize:9,fontWeight:600,color:$.g}}>🪰 HATCHING: </span>
              <span style={{fontSize:10,color:$.dm}}>{hd.active.map(h=>`${h.name} ${h.size}`).join(" · ")}</span>
            </div>}
            <div style={{display:"flex",justifyContent:"space-between",paddingTop:8,borderTop:`1px solid ${$.bd}`,fontSize:10,color:$.dm}}>
              <span>🎣 {sp.catches+sc.length} catches</span><span>by {sp.by}</span>
            </div>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

function Detail({spot,onBack,catches,user,spots,saveSpots,onLog,isPro,onPro}){
  const[tab,setTab]=useState("intel");const[rat,setRat]=useState(0);const[hov,setHov]=useState(0);const[cmt,setCmt]=useState("");
  const[revs,setRevs]=useState([
    {user:"FlyRodKing",r:5,c:"Stellar. 12 browns on dries.",d:"2026-03-28"},
    {user:"TrailMaster",r:5,c:"Best spot in Utah. Never disappoints.",d:"2026-03-20"},
    {user:"BassBandit",r:4,c:"Good numbers, nothing huge. Try south bend.",d:"2026-03-15"},
  ]);
  const hd=HATCH[spot.name];const img=IMG[spot.name];const sc=catches.filter(x=>x.sid===spot.id);
  const guides=GUIDES[spot.id]||[];const gear=GEAR[spot.id]||[];
  const lb={};sc.forEach(x=>{if(!lb[x.user])lb[x.user]={t:0,sp:new Set(),me:new Set()};lb[x.user].t+=x.qty;lb[x.user].sp.add(x.species);lb[x.user].me.add(x.meth);});
  const leaders=Object.entries(lb).map(([u,d])=>({user:u,total:d.t,species:d.sp.size,methods:[...d.me].join(", ")})).sort((a,b)=>b.total-a.total);
  const spC={};sc.forEach(x=>{spC[x.species]=(spC[x.species]||0)+x.qty;});const spR=Object.entries(spC).sort((a,b)=>b[1]-a[1]);const mx=spR[0]?.[1]||1;
  const meC={};sc.forEach(x=>{meC[x.meth]=(meC[x.meth]||0)+x.qty;});const meR=Object.entries(meC).sort((a,b)=>b[1]-a[1]);

  const tabs=[{k:"intel",l:"🪰 Intel"},{k:"guides",l:"🎣 Guides"},{k:"gear",l:"🛒 Gear"},{k:"board",l:"🏆 Board"},{k:"catch",l:"🐟 Caught"},{k:"rev",l:"⭐ Reviews"}];

  return <div>
    <button onClick={onBack} style={{background:"transparent",border:"none",color:$.a,cursor:"pointer",fontFamily:F,fontSize:12,marginBottom:12,padding:0}}>← Back to Spots</button>
    <div style={{borderRadius:14,overflow:"hidden",marginBottom:16,position:"relative"}}>
      {img&&<div style={{height:170,background:`url(${img}) center/cover`}}><div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 15%,#0c1a2bee)"}}/></div>}
      <div style={{position:img?"absolute":"relative",bottom:0,left:0,right:0,padding:"14px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
          <div>
            <h2 style={{fontFamily:FD,fontSize:24,fontWeight:700,margin:0}}>{spot.name}</h2>
            <span style={{color:$.dm,fontSize:11}}>{spot.reg} · by {spot.by}</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            <span style={{background:"#0006",backdropFilter:"blur(4px)",padding:"4px 10px",borderRadius:10,color:$.w,fontSize:15,fontWeight:700}}>★ {spot.rating.toFixed(1)}</span>
            <button onClick={onLog} style={{background:$.g,border:"none",color:"#fff",padding:"7px 14px",borderRadius:8,cursor:"pointer",fontFamily:F,fontWeight:600,fontSize:12}}>+ Log Catch</button>
          </div>
        </div>
        <p style={{color:$.dm,fontSize:11,lineHeight:1.5,margin:"6px 0 0",maxWidth:600}}>{spot.desc}</p>
      </div>
    </div>

    {hd?.cur&&<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:14}}>
      {[{l:"Status",v:hd.cur.status,c:hd.cur.status==="Good"?$.g:$.w},{l:"Flow",v:hd.cur.flow,c:$.a},{l:"Temp",v:hd.cur.temp,c:$.a},{l:"Catches",v:spot.catches+sc.length,c:$.w}].map((s,i)=>(
        <div key={i} style={{background:$.cd,borderRadius:8,padding:"10px 12px",border:`1px solid ${$.bd}`,textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:s.c}}>{s.v}</div><div style={{fontSize:9,color:$.dm,marginTop:2}}>{s.l}</div></div>
      ))}
    </div>}

    <div style={{display:"flex",gap:2,marginBottom:14,borderBottom:`1px solid ${$.bd}`,overflowX:"auto"}}>
      {tabs.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{background:"transparent",border:"none",borderBottom:tab===t.k?`2px solid ${$.a}`:"2px solid transparent",color:tab===t.k?$.aL:$.dm,padding:"7px 12px",cursor:"pointer",fontFamily:F,fontSize:11,fontWeight:500,whiteSpace:"nowrap"}}>{t.l}</button>)}
    </div>

    {tab==="intel"&&hd&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
      <Card><h3 style={h3}>🪰 Hatching Now</h3>{hd.active.map((h,i)=><div key={i} style={{padding:"7px 0",borderBottom:i<hd.active.length-1?`1px solid ${$.bd}`:"none"}}>
        <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:12}}>{h.name}</span><span style={{color:$.dm,fontSize:10}}>{h.size} · {h.time}</span></div>
        <div style={{color:$.mt,fontSize:10,marginTop:2}}>{h.note}</div>
      </div>)}</Card>
      <Card><h3 style={h3}>🎣 What to Use</h3>{hd.tactics.map((tc,i)=><div key={i} style={{marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:600,color:$.a,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>{tc.type}</div>
        {tc.flies.map((f,j)=><div key={j} style={{fontSize:10,color:$.dm,padding:"1px 0 1px 10px",position:"relative"}}><span style={{position:"absolute",left:0,color:$.mt}}>›</span>{f}</div>)}
      </div>)}
      {hd.tip&&<div style={{background:$.wD+"18",borderRadius:7,padding:"7px 10px",marginTop:8,borderLeft:`3px solid ${$.w}`}}>
        <div style={{fontSize:9,fontWeight:600,color:$.w,textTransform:"uppercase",marginBottom:2}}>Pro Tip</div>
        <div style={{fontSize:10,color:$.dm,lineHeight:1.4}}>{hd.tip}</div>
      </div>}</Card>
      <Card style={{gridColumn:"1/-1"}}><h3 style={h3}>📅 Hatch Calendar</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(12,1fr)",gap:3}}>
          {hd.cal.map((m,i)=><div key={m.m} style={{background:i===MO?$.aD+"28":$.sf,borderRadius:6,padding:"6px 2px",textAlign:"center",border:i===MO?`1px solid ${$.a}44`:`1px solid ${$.bd}`}}>
            <div style={{fontSize:9,fontWeight:600,color:i===MO?$.aL:$.dm,marginBottom:3}}>{m.m}</div>
            {m.b.map((b,j)=><div key={j} style={{fontSize:7,color:$.dm,lineHeight:1.3}}>{b}</div>)}
          </div>)}
        </div>
        {!isPro&&<div style={{marginTop:10,background:$.proD+"12",borderRadius:7,padding:"7px 10px",border:`1px solid ${$.proD}25`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:10,color:$.dm}}>⚡ <span style={{color:$.pro,fontWeight:600}}>Pro:</span> Get push alerts when hatches fire</span>
          <button onClick={onPro} style={proBtn}>Upgrade</button>
        </div>}
      </Card>
    </div>}
